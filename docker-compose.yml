services:
  db:
    image: postgres:15-alpine
    container_name: logistic-order-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: logistic-order-redis
    ports:
      - "6379:6379"
  app:
    build: .
    container_name: logistic-order-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    ports:
      - "3030:3030"
    command: >
      sh -c "npx prisma migrate deploy && npm run start"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules