version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: freela-facil-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: freela_facil
    ports:
      - '5432:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data